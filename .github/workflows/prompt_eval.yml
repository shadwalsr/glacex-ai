name: Prompt Evaluation & Promotion

on:
  workflow_dispatch:
    inputs:
      promote:
        description: "Promote classify_v2 if eval passes?"
        type: boolean
        default: false
        required: false
      v1_path:
        description: "Path to v1 prompt"
        type: string
        default: "prompts/classify_v1.txt"
        required: false
      v2_path:
        description: "Path to v2 prompt"
        type: string
        default: "prompts/classify_v2.txt"
        required: false

  schedule:
    # 1st of every month at 10:00 UTC
    - cron: "0 10 1 * *"

jobs:
  evaluate:
    name: Evaluate & optionally promote classify prompt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # needed to push config/prompt_versions.yaml

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
      LANGSMITH_API_KEY:    ${{ secrets.LANGSMITH_API_KEY }}
      NTFY_TOPIC:           ${{ secrets.NTFY_TOPIC }}
      NTFY_TOKEN:           ${{ secrets.NTFY_TOKEN }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so we can push

      # -----------------------------------------------------------------------
      # 2. Install uv
      # -----------------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v2

      # -----------------------------------------------------------------------
      # 3. Setup Python 3.11
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # 4. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: uv sync

      # -----------------------------------------------------------------------
      # 5. Fetch LangSmith misclassifications (informational — never fails CI)
      # -----------------------------------------------------------------------
      - name: Fetch LangSmith misclassifications
        continue-on-error: true
        run: |
          uv run python scripts/fetch_langsmith_misclassifications.py --days 28

      # -----------------------------------------------------------------------
      # 6. Run prompt evaluation
      # -----------------------------------------------------------------------
      - name: Run prompt evaluation
        id: eval
        continue-on-error: true   # capture exit code manually
        run: |
          set +e
          uv run python scripts/eval_classify_prompt.py \
            --v1 "${{ github.event.inputs.v1_path || 'prompts/classify_v1.txt' }}" \
            --v2 "${{ github.event.inputs.v2_path || 'prompts/classify_v2.txt' }}" \
            --output-json /tmp/eval_result.json
          echo "eval_exit_code=$?" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 7. Parse eval results and expose outputs
      # -----------------------------------------------------------------------
      - name: Parse eval results
        id: parse
        run: |
          if [ -f /tmp/eval_result.json ]; then
            python3 -c "
          import json, sys
          d = json.load(open('/tmp/eval_result.json'))
          print('v2_accuracy='  + str(round(d.get('v2_accuracy', 0), 4)))
          print('v1_accuracy='  + str(round(d.get('v1_accuracy', 0), 4)))
          print('v2_better='    + str(d.get('v2_better_or_equal', False)).lower())
          print('accuracy_delta=' + str(round(d.get('accuracy_delta', 0), 4)))
          " >> "$GITHUB_OUTPUT"
          else
            echo "v2_accuracy=0"      >> "$GITHUB_OUTPUT"
            echo "v1_accuracy=0"      >> "$GITHUB_OUTPUT"
            echo "v2_better=false"    >> "$GITHUB_OUTPUT"
            echo "accuracy_delta=0"   >> "$GITHUB_OUTPUT"
            echo "[WARN] eval_result.json not found — eval may have failed."
          fi

      # -----------------------------------------------------------------------
      # 8. Upload eval artifact
      # -----------------------------------------------------------------------
      - name: Upload eval result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-result-${{ github.run_number }}
          path: /tmp/eval_result.json
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # 9. Promote if requested and eval passed
      # -----------------------------------------------------------------------
      - name: Promote classify_v2
        if: |
          github.event.inputs.promote == 'true' &&
          steps.eval.outputs.eval_exit_code == '0'
        run: |
          echo "[INFO] Promoting classify_v2 …"
          uv run python scripts/promote_classify_prompt.py --classify classify_v2

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/prompt_versions.yaml
          git commit -m "chore: promote classify prompt to classify_v2 [eval passed, accuracy=${{ steps.parse.outputs.v2_accuracy }}]"
          git push

      # -----------------------------------------------------------------------
      # 10. Notify via ntfy
      # -----------------------------------------------------------------------
      - name: Notify via ntfy
        if: always() && env.NTFY_TOPIC != ''
        run: |
          EVAL_EXIT="${{ steps.eval.outputs.eval_exit_code }}"
          V2_ACC="${{ steps.parse.outputs.v2_accuracy }}"
          V1_ACC="${{ steps.parse.outputs.v1_accuracy }}"
          DELTA="${{ steps.parse.outputs.accuracy_delta }}"
          PROMOTE_INPUT="${{ github.event.inputs.promote }}"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"

          if [ "$EVAL_EXIT" = "0" ]; then
            TITLE="✅ GlaceX Prompt Eval Passed"
            MSG="v2_acc=${V2_ACC} | v1_acc=${V1_ACC} | delta=${DELTA}"
            if [ "$PROMOTE_INPUT" = "true" ]; then
              MSG="${MSG} | classify_v2 promoted ✅"
            fi
            PRIORITY="default"
            TAGS="white_check_mark"
          else
            TITLE="❌ GlaceX Prompt Eval — Regression Detected"
            MSG="v2_acc=${V2_ACC} | v1_acc=${V1_ACC} | delta=${DELTA} | v2 is WORSE"
            PRIORITY="high"
            TAGS="warning"
          fi

          AUTH_HEADER=""
          if [ -n "$NTFY_TOKEN" ]; then
            AUTH_HEADER="-H \"Authorization: Bearer ${NTFY_TOKEN}\""
          fi

          curl -s \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIORITY}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            ${AUTH_HEADER:+$AUTH_HEADER} \
            -d "${MSG}" \
            "https://ntfy.sh/${NTFY_TOPIC}" || echo "[WARN] ntfy notification failed (non-fatal)"
