name: GlaceX Pipeline
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger for testing

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 50      # hard cap — free tier has 60 min/job limit
    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_DB_URL:   ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      SENTRY_DSN:        ${{ secrets.SENTRY_DSN }}
      NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}

    steps:
    - uses: actions/checkout@v4

    - name: Cache NLP models
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/huggingface
          ~/.cache/spacy
        key: ${{ runner.os }}-nlp-${{ hashFiles('pyproject.toml') }}

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version-file: "pyproject.toml"

    - name: Install dependencies
      run: uv sync

    - name: Install Playwright browsers
      run: uv run playwright install chromium --with-deps

    - name: Validate environment
      run: uv run python scripts/validate_env.py

    - name: Run Smoke Tests
      run: uv run pytest tests/smoke/ -v

    - name: Phase 1 — Ingest
      run: uv run python -m agents.ingestion_agent

    - name: Phase 2 — Embed & NER
      run: uv run python -m agents.nlp_agent

    - name: Phase 3 — Deduplicate
      run: uv run python -m agents.dedup_agent

    - name: Phase 4 — LLM Analysis
      run: uv run python -m agents.analysis_agent

    - name: Phase 5 — Store & Deliver
      run: uv run python -m agents.delivery_agent
