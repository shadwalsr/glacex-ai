name: GlaceX Pipeline
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger for testing

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20      # hard ceiling to protect budget
    strategy:
      fail-fast: false
    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_DB_URL:   ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      SENTRY_DSN:        ${{ secrets.SENTRY_DSN }}
      NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}

    steps:
    - uses: actions/checkout@v4

    - name: Cache Python virtualenv
      id: venv-cache
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('uv.lock') }}

    - name: Cache NLP models
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/huggingface
          ~/.cache/spacy
        key: ${{ runner.os }}-nlp-${{ hashFiles('pyproject.toml') }}

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install OS dependencies for lxml
      run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt-dev

    - name: Install dependencies
      if: steps.venv-cache.outputs.cache-hit != 'true'
      run: uv sync

    - name: Install Playwright OS dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: uv run playwright install-deps chromium

    - name: Install Playwright browsers (with deps)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: uv run playwright install chromium --with-deps

    - name: Validate YAML sources and backlog
      run: uv run python scripts/validate_sources.py

    - name: Validate environment
      run: uv run python scripts/validate_env.py

    - name: Run Smoke Tests
      run: uv run pytest tests/smoke/ -v

    - name: Phase 1 — Ingest
      run: uv run python -m agents.ingestion_agent

    - name: Phase 2 — Embed & NER
      run: uv run python -m agents.nlp_agent

    - name: Phase 3 — Deduplicate
      run: uv run python -m agents.dedup_agent

    - name: Phase 4 — LLM Analysis
      run: uv run python -m agents.analysis_agent

    - name: Phase 5 — Store & Deliver
      run: uv run python -m agents.delivery_agent
