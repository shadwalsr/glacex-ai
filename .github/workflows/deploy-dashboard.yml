name: Build & Deploy Dashboard
on:
  push:
    branches: [main]
    paths: ['dashboard/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Create 404 fallback
        run: cp ../docs/index.html ../docs/404.html

      - name: Commit built dashboard to docs/
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild dashboard"
          file_pattern: docs/*
